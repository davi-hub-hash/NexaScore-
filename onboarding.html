<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexuScore - Seleção de Região</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #05070a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #0d1117; padding: 40px; border-radius: 15px; border: 1px solid #30363d; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 22px; margin-bottom: 10px; color: #00d2ff; }
        p { color: #8b949e; font-size: 14px; margin-bottom: 30px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; color: white; display: block; }
        .btn-br { background: #22c55e; }
        .btn-us { background: #3b82f6; }
        .btn-eu { background: #f59e0b; }
        button:hover { transform: translateY(-3px); filter: brightness(1.2); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="status">Carregando...</h2>
        <p id="instrucao">Aguarde a conexão com o servidor.</p>
        
        <button id="br" class="btn-br" onclick="window.finalizar('Brasil', 'R$')" disabled>🇧🇷 BRASIL</button>
        <button id="us" class="btn-us" onclick="window.finalizar('USA', '$')" disabled>🇺🇸 USA</button>
        <button id="eu" class="btn-eu" onclick="window.finalizar('Europa', '€')" disabled>🇪🇺 EUROPA</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Verifica se o usuário está logado para liberar os botões
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('status').innerText = "Região";
                document.getElementById('instrucao').innerText = "Selecione sua localidade:";
                document.querySelectorAll('button').forEach(b => b.disabled = false);
            } else {
                alert("Sessão expirada. Faça login novamente.");
                window.location.href = 'index.html';
            }
        });

        window.finalizar = async function(pais, moeda) {
            const user = auth.currentUser;
            if (!user) return;

            try {
                await setDoc(doc(db, "usuarios", user.uid), {
                    pais: pais,
                    moeda: moeda,
                    configurado: true,
                    email: user.email
                }, { merge: true });

                window.location.href = 'dashboard.html';
            } catch (error) {
                alert("Erro ao salvar: " + error.message);
            }
        };
    </script>
</body>
</html>
