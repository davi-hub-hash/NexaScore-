<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NexuScore - Configuração Inicial</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #0d1117; padding: 30px; border-radius: 15px; border: 1px solid #30363d; text-align: center; width: 320px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-br { background: #22c55e; color: white; }
        .btn-us { background: #3b82f6; color: white; }
        .btn-eu { background: #f59e0b; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Selecione sua Região</h2>
        <p style="color: #8b949e;">Isso configurará seu idioma e moeda.</p>
        
        <button class="btn-br" onclick="finalizar('Brasil', 'R$')">🇧🇷 BRASIL</button>
        <button class="btn-us" onclick="finalizar('USA', '$')">🇺🇸 USA</button>
        <button class="btn-eu" onclick="finalizar('Europa', '€')">🇪🇺 EUROPA</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.finalizar = async function(pais, moeda) {
            const user = auth.currentUser;

            if (!user) {
                alert("Erro: Sessão expirada. Faça login novamente.");
                window.location.href = 'login.html';
                return;
            }

            try {
                // SALVANDO NO FIRESTORE
                await setDoc(doc(db, "usuarios", user.uid), {
                    pais: pais,
                    moeda: moeda,
                    email: user.email,
                    configurado: true
                }, { merge: true });

                alert("Configuração salva com sucesso!");
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                alert("Erro ao salvar. Verifique as 'Regras' do seu Firebase!");
            }
        };
    </script>
</body>
</html>
