<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexuScore - Configuração</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #05070a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #0d1117; padding: 30px; border-radius: 12px; border: 1px solid #30363d; text-align: center; width: 300px; }
        button { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        .btn-br { background: #22c55e; }
        .btn-us { background: #3b82f6; }
        .btn-eu { background: #f59e0b; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Selecione sua Região</h2>
        <p style="color: #8b949e; font-size: 14px;">Escolha para configurar o sistema</p>
        
        <button class="btn-br" onclick="window.salvarRegiao('Brasil', 'R$')">🇧🇷 BRASIL</button>
        <button class="btn-us" onclick="window.salvarRegiao('USA', '$')">🇺🇸 USA</button>
        <button class="btn-eu" onclick="window.salvarRegiao('Europa', '€')">🇪🇺 EUROPA</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        window.salvarRegiao = async function(pais, moeda) {
            const user = auth.currentUser;

            if (!user) {
                alert("Erro: Você não está logado!");
                return;
            }

            try {
                // SALVA NO FIREBASE (A coleção que você tem lá)
                await setDoc(doc(db, "usuarios", user.uid), {
                    pais: pais,
                    moeda: moeda,
                    configurado: true
                }, { merge: true });

                alert("Configurado para " + pais);
                window.location.href = 'dashboard.html';
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        };

        // Garante que o Firebase reconhece o usuário ao carregar a página
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                console.log("Nenhum usuário logado.");
            } else {
                console.log("Usuário logado:", user.uid);
            }
        });
    </script>
</body>
</html>
