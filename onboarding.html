<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexuScore - Configuração</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #05070a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #0d1117; padding: 30px; border-radius: 12px; border: 1px solid #30363d; text-align: center; width: 300px; }
        h2 { margin-bottom: 5px; font-size: 18px; }
        p { color: #8b949e; font-size: 12px; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-br { background: #22c55e; color: white; }
        .btn-us { background: #3b82f6; color: white; }
        .btn-eu { background: #f59e0b; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Selecione sua Região</h2>
        <p>Isso configurará seu idioma e moeda.</p>
        
        <button class="btn-br" onclick="salvarRegiao('Brasil', 'R$')">🇧🇷 BRASIL</button>
        <button class="btn-us" onclick="salvarRegiao('USA', '$')">🇺🇸 USA</button>
        <button class="btn-eu" onclick="salvarRegiao('Europa', '€')">🇪🇺 EUROPA</button>
    </div>

    <script type="module">
        // Importa as configurações do seu arquivo firebase-config.js
        import { auth, db } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Deixa a função visível para o clique do botão
        window.salvarRegiao = async function(pais, moeda) {
            const user = auth.currentUser;

            if (!user) {
                alert("Por favor, faça login primeiro!");
                window.location.href = 'index.html';
                return;
            }

            try {
                // Salva no Firestore na coleção 'usuarios' com o ID do usuário (UID)
                await setDoc(doc(db, "usuarios", user.uid), {
                    pais: pais,
                    moeda: moeda,
                    configurado: true
                }, { merge: true });

                console.log("Configuração salva para:", pais);
                // Redireciona para o Dashboard que vai ler esses dados
                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Erro ao salvar: " + error.message);
            }
        };
    </script>
</body>
</html>
