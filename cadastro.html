<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NexuScore 3.0 - Cadastro Global</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #0d1117; padding: 40px; border-radius: 15px; border: 1px solid #30363d; width: 350px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; box-sizing: border-box; }
        button { background: #00d2ff; color: black; font-weight: bold; border: none; cursor: pointer; }
        h2 { text-align: center; color: #00d2ff; }
    </style>
</head>
<body>

<div class="box">
    <h2>Criar Conta Nexu</h2>
    <input type="email" id="email" placeholder="Seu E-mail">
    <input type="password" id="senha" placeholder="Sua Senha">
    
    <label style="display:block; margin-top:15px; font-size:12px; color:#8b949e;">Selecione sua Região:</label>
    <select id="pais">
        <option value="Brasil">Brasil (R$)</option>
        <option value="USA">USA ($)</option>
        <option value="Europa">Europa (€)</option>
    </select>

    <button id="btnCadastrar">CADASTRAR E CONFIGURAR</button>
    <p style="text-align:center; font-size:12px;"><a href="index.html" style="color:#8b949e;">Já tenho conta</a></p>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('btnCadastrar').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const paisEscolhido = document.getElementById('pais').value;

        // Define a moeda com base no país
        let moedaEscolhida = "R$";
        if(paisEscolhido === "USA") moedaEscolhida = "$";
        if(paisEscolhido === "Europa") moedaEscolhida = "€";

        try {
            // 1. Cria o usuário no Authentication
            const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
            const user = userCredential.user;

            // 2. SALVA NO BANCO DE DADOS (Cria a pasta 'usuarios' e o ID igual ao UID)
            await setDoc(doc(db, "usuarios", user.uid), {
                email: email,
                pais: paisEscolhido,
                moeda: moedaEscolhida,
                uid: user.uid
            });

            alert("Conta criada com sucesso para " + paisEscolhido + "!");
            window.location.href = 'dashboard.html';

        } catch (error) {
            alert("Erro ao cadastrar: " + error.message);
        }
    });
</script>

</body>
</html>
