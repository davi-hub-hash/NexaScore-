<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexuScore 3.0 - Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #05070a;
            --sidebar-color: #0d1117;
            --accent: #00d2ff;
            --text-primary: #ffffff;
            --text-secondary: #8b949e;
            --sidebar-width-collapsed: 70px;
            --sidebar-width-expanded: 260px;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-primary); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-width-collapsed); background-color: var(--sidebar-color); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; transition: width 0.3s ease; z-index: 1000; border-right: 1px solid #30363d; overflow: hidden; }
        .sidebar:hover { width: var(--sidebar-width-expanded); }

        .sidebar-brand { height: 70px; display: flex; align-items: center; padding: 0 23px; color: var(--accent); font-weight: 800; border-bottom: 1px solid #1f2937; }
        .sidebar-brand span { margin-left: 20px; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
        .sidebar:hover .sidebar-brand span { opacity: 1; }

        .nav-list { flex-grow: 1; margin-top: 15px; overflow-y: auto; overflow-x: hidden; }
        .nav-link { display: flex; align-items: center; padding: 14px 25px; color: var(--text-secondary); text-decoration: none; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { color: var(--accent); background: rgba(0, 210, 255, 0.08); border-left: 4px solid var(--accent); }
        .nav-link i { min-width: 25px; font-size: 18px; text-align: center; }
        .nav-link span { margin-left: 20px; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
        .sidebar:hover .nav-link span { opacity: 1; }

        /* CONTEÚDO */
        .main-wrapper { margin-left: var(--sidebar-width-collapsed); flex-grow: 1; padding: 30px; transition: margin-left 0.3s ease; width: 100%; }
        .sidebar:hover ~ .main-wrapper { margin-left: var(--sidebar-width-expanded); }

        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .card h3 { margin: 0; color: var(--text-secondary); font-size: 13px; text-transform: uppercase; }
        .card .value { font-size: 28px; font-weight: bold; margin-top: 10px; color: var(--accent); }

        .logout-btn { padding: 20px 25px; color: #f85149; border-top: 1px solid #30363d; display: flex; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand"><i class="fas fa-layer-group"></i> <span>NEXUSCORE 3.0</span></div>
        <nav class="nav-list">
            <div class="nav-link active" onclick="showSection('dashboard')"><i class="fas fa-chart-pie"></i> <span class="lang-aba1">Dashboard</span></div>
            <div class="nav-link" onclick="showSection('clientes')"><i class="fas fa-users"></i> <span class="lang-aba2">Clientes</span></div>
            <div class="nav-link" onclick="showSection('funcionarios')"><i class="fas fa-user-tie"></i> <span class="lang-aba3">Funcionários</span></div>
            <div class="nav-link" onclick="showSection('produtos')"><i class="fas fa-box-open"></i> <span class="lang-aba4">Produtos</span></div>
            <div class="nav-link" onclick="showSection('vendas')"><i class="fas fa-shopping-cart"></i> <span class="lang-aba5">Vendas</span></div>
            <div class="nav-link" onclick="showSection('financeiro')"><i class="fas fa-wallet"></i> <span class="lang-aba6">Financeiro</span></div>
            <div class="nav-link" onclick="showSection('relatorios')"><i class="fas fa-file-invoice-dollar"></i> <span class="lang-aba7">Relatórios</span></div>
            <div class="nav-link" onclick="showSection('configuracoes')"><i class="fas fa-cog"></i> <span class="lang-aba8">Configurações</span></div>
        </nav>
        <div class="logout-btn" id="btnLogout"><i class="fas fa-sign-out-alt"></i> <span style="margin-left: 20px;" class="lang-logout">Sair</span></div>
    </aside>

    <main class="main-wrapper">
        <header>
            <h1 id="txt-welcome">...</h1>
            <p id="user-display" style="color: var(--text-secondary)"><span class="lang-region">Região</span>: <span id="countryDisplay">---</span></p>
        </header>

        <section id="dashboard" class="content-section active">
            <div class="grid">
                <div class="card"><h3 id="lbl-vendas">Vendas</h3><span class="value"><span class="moeda">...</span> 0,00</span></div>
                <div class="card"><h3 id="lbl-saldo">Saldo</h3><span class="value"><span class="moeda">...</span> 0,00</span></div>
            </div>
        </section>

        <section id="clientes" class="content-section"><h1 class="lang-aba2">Clientes</h1></section>
        <section id="funcionarios" class="content-section"><h1 class="lang-aba3">Funcionários</h1></section>
        <section id="produtos" class="content-section"><h1 class="lang-aba4">Produtos</h1></section>
        <section id="vendas" class="content-section"><h1 class="lang-aba5">Vendas</h1></section>
        <section id="financeiro" class="content-section"><h1 class="lang-aba6">Financeiro</h1></section>
        <section id="relatorios" class="content-section"><h1 class="lang-aba7">Relatórios</h1></section>
        <section id="configuracoes" class="content-section"><h1 class="lang-aba8">Configurações</h1></section>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // DICIONÁRIO COMPLETO DE TRADUÇÃO
        const traducoes = {
            'Brasil': {
                welcome: 'Bem-vindo ao NexuScore', region: 'Região', logout: 'Sair',
                aba1: 'Painel', aba2: 'Clientes', aba3: 'Equipe', aba4: 'Produtos',
                aba5: 'Vendas', aba6: 'Financeiro', aba7: 'Relatórios', aba8: 'Ajustes',
                vendas: 'Vendas Totais', saldo: 'Saldo em Caixa'
            },
            'USA': {
                welcome: 'Welcome to NexuScore', region: 'Region', logout: 'Logout',
                aba1: 'Dashboard', aba2: 'Customers', aba3: 'Staff', aba4: 'Products',
                aba5: 'Sales', aba6: 'Financial', aba7: 'Reports', aba8: 'Settings',
                vendas: 'Total Sales', saldo: 'Cash Balance'
            },
            'Europa': {
                welcome: 'Welcome to NexuScore (EU)', region: 'Region', logout: 'Logout',
                aba1: 'Dashboard', aba2: 'Clients', aba3: 'Employees', aba4: 'Inventory',
                aba5: 'Sales', aba6: 'Finance', aba7: 'Analytics', aba8: 'Settings',
                vendas: 'Total Revenue', saldo: 'Available Funds'
            }
        };

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const dados = docSnap.data();
                    const p = dados.pais || 'Brasil';
                    const t = traducoes[p] || traducoes['Brasil'];

                    // 1. Traduz Textos Principais
                    document.getElementById('txt-welcome').innerText = t.welcome;
                    document.getElementById('lbl-vendas').innerText = t.vendas;
                    document.getElementById('lbl-saldo').innerText = t.saldo;
                    document.getElementById('countryDisplay').innerText = p;
                    
                    // 2. Traduz Menu Lateral (Abas)
                    document.querySelector('.lang-aba1').innerText = t.aba1;
                    document.querySelectorAll('.lang-aba2').forEach(el => el.innerText = t.aba2);
                    document.querySelectorAll('.lang-aba3').forEach(el => el.innerText = t.aba3);
                    document.querySelectorAll('.lang-aba4').forEach(el => el.innerText = t.aba4);
                    document.querySelectorAll('.lang-aba5').forEach(el => el.innerText = t.aba5);
                    document.querySelectorAll('.lang-aba6').forEach(el => el.innerText = t.aba6);
                    document.querySelectorAll('.lang-aba7').forEach(el => el.innerText = t.aba7);
                    document.querySelectorAll('.lang-aba8').forEach(el => el.innerText = t.aba8);
                    document.querySelector('.lang-logout').innerText = t.logout;
                    document.querySelector('.lang-region').innerText = t.region;

                    // 3. Aplica a Moeda
                    document.querySelectorAll('.moeda').forEach(el => {
                        el.innerText = dados.moeda || 'R$';
                    });
                }
            } else { window.location.href = 'index.html'; }
        });

        window.showSection = function(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        document.getElementById('btnLogout').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'index.html');
        });
    </script>
</body>
</html>
