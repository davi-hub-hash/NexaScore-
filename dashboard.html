<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NexuScore - Dashboard</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .box { background: #0d1117; padding: 20px; border-radius: 10px; border: 1px solid #30363d; display: inline-block; }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="titulo">Carregando dados...</h1>
        <p id="info">Identificando sua região e moeda...</p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                
                if (docSnap.exists()) {
                    const dados = docSnap.data();
                    
                    if (dados.pais === "Brasil") {
                        document.getElementById('titulo').innerText = "Bem-vindo ao NexuScore!";
                        document.getElementById('info').innerText = "Sua conta está configurada em Reais (R$).";
                    } else {
                        document.getElementById('titulo').innerText = "Welcome to NexuScore!";
                        document.getElementById('info').innerText = `Your account is set to ${dados.pais} (${dados.moeda}).`;
                    }
                } else {
                    window.location.href = 'onboarding.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
